# ===== 自動デイトレ監視システム 設定 =====
# コードを変えずに挙動を調整するための設定ファイル（仕様§5.2：数値は外出し）。

# 監視銘柄（低位・高流動・業種分散で選定。実価格はツールが表示）
watchlist:
  - { symbol: "7201.T", name: "日産自動車" }
  - { symbol: "8604.T", name: "野村HD" }
  - { symbol: "9501.T", name: "東京電力HD" }
  - { symbol: "4385.T", name: "メルカリ" }
  - { symbol: "8306.T", name: "三菱UFJ" }

# データ取得（Step1はyfinanceの遅延データ。本番でkabuに差し替える）
datafeed:
  provider: yfinance
  interval: "1m"        # 1分足
  lookback_days: 2      # 直近2営業日を取得し、最新1営業日でVWAP計算

# 戦略：VWAP順張り（買いのみ）。数値はバックテスト/仮想売買で調整する初期値。
strategy:
  name: vwap_breakout
  params:
    volume_factor: 1.5            # 出来高が直近平均の1.5倍以上で「増加」とみなす
    volume_window: 20             # 出来高移動平均の本数
    recent_high_window: 20        # 直近20本の高値を更新したらブレイク
    skip_minutes_after_open: 5    # 寄り付き直後（前場9:00・後場12:30）から5分は見送り
    skip_minutes_before_close: 30 # 大引け(15:30)前30分＝15:00以降は新規見送り
    min_vwap_diff_pct: 0.1        # VWAPを0.1%以上上抜けたら有効（微小なダマシを除外）
    ma_period: 25                 # 移動平均の期間（参考表示用）
    take_profit_pct: 0.8          # 利確 +0.8%
    stop_loss_pct: 0.5            # 損切り -0.5%
    time_exit_minutes: 30         # 保有30分で時間切れ

# 東証の取引時間（2024/11/5以降。後場は15:30まで）
market:
  timezone: "Asia/Tokyo"
  open: "09:00"
  morning_close: "11:30"
  afternoon_open: "12:30"
  close: "15:30"

# 監視の動作
monitor:
  poll_interval_sec: 30   # loopモードでの再スキャン間隔（秒）
  mode: "once"            # once=1回スキャン / loop=繰り返し

# 通知（auto=Discord URLがあればDiscord、なければコンソール）
notify:
  provider: auto

# 仮想売買・約定（Step2）
trade:
  mode: PAPER                    # PAPER=仮想 / LIVE=実売買（まだ使わない）
  target_position_yen: 350000    # 1ポジの目安金額（100株単位に丸める）
  max_position_yen: 550000       # 100株でこれを超える高すぎる銘柄は自動スキップ
  max_round_trips_per_symbol: 1  # 同一銘柄は1日1往復まで（現物・差金決済規制）
  forced_close_buffer_min: 5     # 大引け(15:30)の5分前に強制決済
  slippage_bps: 5                # 片側スリッページ(bps=0.01%)。約定価格に反映
  commission_bps: 0              # 売買手数料(bps)。現物ゼロ革命前提=0、必要なら設定
  db_path: data/daytrader.db     # SQLite（gitignore対象）

# 複数日バックテスト（Step2）
backtest:
  interval: "5m"   # yfinance制約: 1m=約7日 / 5m・2m=約60日分まで
  days: 30         # 直近何日分（カレンダー日。≈20営業日）
